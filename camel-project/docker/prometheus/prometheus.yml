global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:

  - job_name: 'camel-movies-project'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          application: 'camel-movies-0273'
          env: 'local'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']